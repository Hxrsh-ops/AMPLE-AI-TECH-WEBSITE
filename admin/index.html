<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - AmpletechAI</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0D0D0D;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #F1F1F1;
      --text-muted: #878787;
      --primary: #FFFFFF;
      --primary-hover: #E1E1E1;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
      --accent: #6366F1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Glassmorphic Card Container */
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 24px;
      width: 100%;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--card-border);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      font-family: inherit;
    }

    .btn-primary {
      background-color: var(--primary);
      color: var(--bg);
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-secondary {
      background-color: transparent;
      border-color: var(--card-border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }

    .btn-danger {
      background-color: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .btn-danger:hover {
      background-color: rgba(239, 68, 68, 0.2);
    }

    /* Auth screen */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      padding: 20px;
    }

    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
    }

    .auth-card h2 {
      margin-bottom: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.2s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: rgba(255, 255, 255, 0.3);
    }

    .error-msg {
      color: var(--danger);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* Dashboard Main View */
    #dashboard-screen {
      display: none;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }

    .tab-content {
      display: none;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
    }

    .tab-content.active {
      display: block;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 16px 24px;
      border-bottom: 1px solid var(--card-border);
      font-size: 14px;
    }

    th {
      font-weight: 600;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.01);
    }

    td {
      color: var(--text);
      line-height: 1.5;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-unread {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
    }

    .badge-in_progress {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
    }

    .badge-resolved {
      background: rgba(34, 197, 94, 0.1);
      color: var(--success);
    }

    .status-select {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .message-box {
      max-width: 400px;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 13px;
      color: var(--text-muted);
      padding-right: 10px;
    }

    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- AUTHENTICATION SCREEN -->
  <div id="auth-screen">
    <div class="auth-card">
      <h2>AmpletechAI Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter admin username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Sign In</button>
        <div id="login-error" class="error-msg">Invalid username or password.</div>
      </form>
    </div>
  </div>

  <!-- DASHBOARD MAIN SCREEN -->
  <div id="dashboard-screen" class="container">
    <header>
      <div>
        <h1>AmpletechAI Admin Panel</h1>
        <p style="color: var(--text-muted); font-size: 13px; margin-top: 4px;">Manage contact leads and newsletter subscriptions</p>
      </div>
      <button id="logout-btn" class="btn btn-secondary">Sign Out</button>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('leads')">Contact Submissions</button>
      <button class="tab-btn" onclick="switchTab('subscribers')">Newsletter Subscribers</button>
    </div>

    <!-- Leads Tab Content -->
    <div id="leads-tab" class="tab-content active">
      <div id="leads-table-container">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Name & Contact</th>
              <th>Service & Plan</th>
              <th>Message</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="leads-table-body">
            <!-- Dynamic Submissions Rows -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Newsletter Subscribers Tab Content -->
    <div id="subscribers-tab" class="tab-content">
      <div id="subscribers-table-container">
        <table>
          <thead>
            <tr>
              <th>Date Subscribed</th>
              <th>Subscriber Email</th>
            </tr>
          </thead>
          <tbody id="subscribers-table-body">
            <!-- Dynamic Subscribers Rows -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    let sessionToken = localStorage.getItem('adminToken');
    let autoLogoutTimer = null;

    document.addEventListener('DOMContentLoaded', () => {
      if (sessionToken) {
        showDashboard();
      } else {
        showLogin();
      }

      document.getElementById('login-form').addEventListener('submit', handleLogin);
      document.getElementById('logout-btn').addEventListener('click', handleLogout);
      
      // Auto-inactivity logout setup
      setupInactivityTimer();
    });

    // Inactivity listener
    function setupInactivityTimer() {
      const resetTimer = () => {
        if (!sessionToken) return;
        clearTimeout(autoLogoutTimer);
        autoLogoutTimer = setTimeout(() => {
          console.log('[Auth] Inactivity timeout reached. Logging out...');
          handleLogout();
        }, 15 * 60 * 1000); // 15 Minutes
      };
      
      window.onmousemove = resetTimer;
      window.onkeypress = resetTimer;
      window.onscroll = resetTimer;
      window.onclick = resetTimer;
    }

    function showLogin() {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('dashboard-screen').style.display = 'none';
      clearTimeout(autoLogoutTimer);
    }

    function showDashboard() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';
      fetchDashboardData();
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      
      errorEl.style.display = 'none';

      try {
        const response = await fetch(`${API_URL}/admin-auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.error || 'Authentication failed');
        }

        sessionToken = result.token;
        localStorage.setItem('adminToken', sessionToken);
        showDashboard();
        
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    }

    function handleLogout() {
      sessionToken = null;
      localStorage.removeItem('adminToken');
      showLogin();
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      
      if (tabName === 'leads') {
        event.target.classList.add('active');
        document.getElementById('leads-tab').classList.add('active');
      } else {
        event.target.classList.add('active');
        document.getElementById('subscribers-tab').classList.add('active');
      }
    }

    async function fetchDashboardData() {
      try {
        const response = await fetch(`${API_URL}/admin-data`, {
          headers: {
            'Authorization': `Bearer ${sessionToken}`
          }
        });

        if (response.status === 401) {
          // Token expired or invalid
          handleLogout();
          return;
        }

        const data = await response.json();
        renderLeads(data.submissions || []);
        renderSubscribers(data.subscribers || []);

      } catch (err) {
        console.error('[Fetch Error]', err);
        alert('Failed to connect to admin API. Please try again.');
      }
    }

    function renderLeads(submissions) {
      const tbody = document.getElementById('leads-table-body');
      tbody.innerHTML = '';

      if (submissions.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No submissions found.</td></tr>`;
        return;
      }

      submissions.forEach(sub => {
        const tr = document.createElement('tr');
        const formattedDate = new Date(sub.created_at).toLocaleString();
        
        tr.innerHTML = `
          <td style="white-space: nowrap;">${formattedDate}</td>
          <td>
            <strong>${escapeHtml(sub.name)}</strong><br>
            <a href="mailto:${sub.email}" style="color: var(--accent); text-decoration: none;">${escapeHtml(sub.email)}</a>
            ${sub.location ? `<br><span style="font-size:0.85em; color:var(--text-muted);">📍 ${escapeHtml(sub.location)}</span>` : ''}
          </td>
          <td>
            <span style="font-weight: 500;">${escapeHtml(sub.service_type || 'General inquiry')}</span>
            ${sub.plan ? `<br><span style="font-size:0.85em; background:rgba(255,255,255,0.06); padding:2px 6px; border-radius:4px; font-weight:600;">Plan: ${escapeHtml(sub.plan)}</span>` : ''}
            ${sub.subject ? `<br><span style="font-size:0.8em; color:var(--text-muted);">Subj: ${escapeHtml(sub.subject)}</span>` : ''}
          </td>
          <td>
            <div class="message-box">${escapeHtml(sub.message)}</div>
          </td>
          <td>
            <span class="badge badge-${sub.status}" style="margin-bottom: 8px;">${sub.status}</span><br>
            <select class="status-select" onchange="updateLeadStatus('${sub.id}', this.value)">
              <option value="unread" ${sub.status === 'unread' ? 'selected' : ''}>Unread</option>
              <option value="in_progress" ${sub.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
              <option value="resolved" ${sub.status === 'resolved' ? 'selected' : ''}>Resolved</option>
            </select>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderSubscribers(subscribers) {
      const tbody = document.getElementById('subscribers-table-body');
      tbody.innerHTML = '';

      if (subscribers.length === 0) {
        tbody.innerHTML = `<tr><td colspan="2" class="empty-state">No subscribers found.</td></tr>`;
        return;
      }

      subscribers.forEach(sub => {
        const tr = document.createElement('tr');
        const formattedDate = new Date(sub.created_at).toLocaleString();
        
        tr.innerHTML = `
          <td>${formattedDate}</td>
          <td>
            <a href="mailto:${sub.email}" style="color: var(--text); font-weight:500; text-decoration: none;">${escapeHtml(sub.email)}</a>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function updateLeadStatus(id, newStatus) {
      try {
        const response = await fetch(`${API_URL}/admin-data`, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${sessionToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ id, status: newStatus })
        });

        if (response.status === 401) {
          handleLogout();
          return;
        }

        if (!response.ok) {
          throw new Error('Failed to update status.');
        }

        // Refresh panel data
        fetchDashboardData();

      } catch (err) {
        console.error(err);
        alert('Failed to update lead status. Please try again.');
      }
    }

    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
